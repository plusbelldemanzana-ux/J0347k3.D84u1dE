<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso remoto...</title>
  <style>
    :root{
      --bg:#05070a;
      --panel:#0b0f14;
      --green:#58ff7e;
      --green2:#21d84f;
      --red:#ff4d4d;
      --text:#c8ffd6;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(40,255,120,.08), transparent 35%),
        linear-gradient(180deg, #020304, #071018 70%);
      color:var(--text);
      font-family: monospace;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    #matrix{
      position:fixed;
      inset:0;
      z-index:0;
      opacity:.22;
    }

    .wrap{
      position:relative;
      z-index:2;
      width:min(920px, 100%);
    }

    .terminal{
      position:relative;
      background:rgba(8,12,18,.88);
      border:1px solid rgba(88,255,126,.35);
      border-radius:18px;
      overflow:hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 25px 80px rgba(0,0,0,.55),
        0 0 30px rgba(88,255,126,.12);
      backdrop-filter: blur(6px);
    }

    .terminal::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.03) 0px,
          rgba(255,255,255,.03) 1px,
          transparent 2px,
          transparent 4px
        );
      pointer-events:none;
      opacity:.18;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:8px;
      padding:12px 16px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    }

    .dot{width:11px;height:11px;border-radius:50%}
    .d1{background:#ff5f57}
    .d2{background:#ffbd2e}
    .d3{background:#28c840}

    .title{
      margin-left:10px;
      color:#9be9b1;
      font-size:14px;
      opacity:.9;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .content{
      padding:20px;
    }

    .big{
      font-size: clamp(26px, 4vw, 44px);
      color:var(--green);
      font-weight:700;
      letter-spacing:2px;
      margin:4px 0 18px;
      text-shadow:0 0 12px rgba(88,255,126,.35);
    }
